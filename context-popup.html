<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生日礼物菜单</title>
    <link rel="stylesheet" href="/src/styles/panel.css" />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
      #ctx-root {
        width: 100%;
        height: 100%;
        padding: 6px;
        box-sizing: border-box;
      }
      #ctx-root .ctx-panel {
        position: relative !important;
        left: 0 !important;
        top: 0 !important;
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        animation: none;
      }
      #ctx-menu {
        position: static !important;
        pointer-events: auto !important;
      }
    </style>
  </head>
  <body>
    <div id="ctx-root"></div>
    <script type="module" src="/src/context-popup.js"></script>
  </body>
</html>
