name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Read version
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=mac-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "asset=aqun-desktop-pet-mac-v${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Prepare AI secrets
        env:
          AI_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          if [ -n "$AI_API_KEY" ]; then
            node -e "const fs=require('fs'); fs.writeFileSync('electron/aiSecrets.local.cjs', 'module.exports = { apiKey: ' + JSON.stringify(process.env.AI_API_KEY) + ' };');"
            echo "[ai] 已从 DASHSCOPE_API_KEY Secret 写入 API Key"
          elif [ -f electron/aiSecrets.local.cjs ]; then
            echo "[ai] 使用仓库中的 aiSecrets.local.cjs"
          else
            cp electron/aiSecrets.local.cjs.example electron/aiSecrets.local.cjs
            echo "[ai] 未设置 DASHSCOPE_API_KEY Secret，AI 功能在打包产物中不可用"
            echo "[ai] 请在仓库 Settings → Secrets → Actions 添加 DASHSCOPE_API_KEY"
          fi
        shell: bash

      - name: Install dependencies
        run: npm ci

      - name: Build macOS portable
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build:mac

      - name: Archive portable bundle
        run: |
          zip -r "${{ steps.meta.outputs.asset }}" "给阿群的生日礼物" "给阿群的生日礼物.command"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          ASSET="${{ steps.meta.outputs.asset }}"
          VERSION="${{ steps.meta.outputs.version }}"
          NOTES="Mac 便携版自动构建（v${VERSION}）。

          **使用说明**
          1. 下载 \`${ASSET}\` 并解压
          2. 双击 \`给阿群的生日礼物/启动.app\`（或 \`给阿群的生日礼物.command\`）
          3. 首次运行若被 Gatekeeper 拦截：右键 → 打开
          4. 键盘 HUD 需在 **系统设置 → 隐私与安全性 → 辅助功能** 中授权「启动」

          构建提交：${{ github.sha }}
          [查看本次工作流](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
            gh release edit "$TAG" --notes "$NOTES"
            echo "Updated release: $TAG"
          else
            gh release create "$TAG" "$ASSET" \
              --title "Mac 便携版 v${VERSION}" \
              --notes "$NOTES"
            echo "Created release: $TAG"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: aqun-desktop-pet-mac
          path: ${{ steps.meta.outputs.asset }}
          retention-days: 14
