name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/**'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Prepare AI secrets
        env:
          AI_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          if [ -n "$AI_API_KEY" ]; then
            node -e "const fs=require('fs'); fs.writeFileSync('electron/aiSecrets.local.cjs', 'module.exports = { apiKey: ' + JSON.stringify(process.env.AI_API_KEY) + ' };');"
            echo "[ai] 已从 DASHSCOPE_API_KEY Secret 写入 API Key"
          elif [ -f electron/aiSecrets.local.cjs ]; then
            echo "[ai] 使用仓库中的 aiSecrets.local.cjs"
          else
            cp electron/aiSecrets.local.cjs.example electron/aiSecrets.local.cjs
            echo "[ai] 未设置 DASHSCOPE_API_KEY Secret，AI 功能在打包产物中不可用"
            echo "[ai] 请在仓库 Settings → Secrets → Actions 添加 DASHSCOPE_API_KEY"
          fi
        shell: bash

      - name: Install dependencies
        run: npm ci

      - name: Build macOS portable
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build:mac

      - name: Archive portable bundle
        run: |
          zip -r aqun-desktop-pet-mac.zip "给阿群的生日礼物" "给阿群的生日礼物.command"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aqun-desktop-pet-mac
          path: aqun-desktop-pet-mac.zip
          retention-days: 14
